name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-typecheck-test:
    name: ESLint, TypeScript, Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint, TypeScript, and Jest
        run: yarn lint
